<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#2a4050"/>
    </linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5060"/>
      <stop offset="100%" style="stop-color:#2a3a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sky)"/>
  <!-- Edinburgh skyline silhouette -->
  <polygon points="0,600 0,350 80,300 120,340 180,280 250,320 300,250 350,300 400,220 450,280 500,200 550,260 600,180 650,250 700,200 750,280 800,220 850,300 900,250 950,320 1000,280 1050,340 1100,300 1150,350 1200,320 1200,600" fill="#1a2a3a" opacity="0.6"/>
  <polygon points="0,600 0,400 100,380 200,420 300,350 400,400 500,340 600,390 700,360 800,410 900,370 1000,420 1100,390 1200,430 1200,600" fill="url(#building)" opacity="0.7"/>
  <!-- Construction elements -->
  <rect x="100" y="420" width="80" height="40" fill="#C41E3A" opacity="0.3" rx="4"/>
  <rect x="300" y="400" width="120" height="50" fill="#C41E3A" opacity="0.2" rx="4"/>
  <rect x="600" y="430" width="90" height="35" fill="#C41E3A" opacity="0.25" rx="4"/>
  <rect x="900" y="410" width="100" height="45" fill="#C41E3A" opacity="0.2" rx="4"/>
</svg>
